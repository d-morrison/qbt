# Calls the reusable Claude review workflow in d-morrison/gha. The
# workflow_dispatch path lets claude.yml re-dispatch a review after an @claude
# run pushes commits — keep this file named claude-code-review.yml.
#
# Pinned to the @v2 moving major tag.
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: number

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: d-morrison/gha/.github/workflows/claude-code-review.yml@v2
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      pr-number: ${{ inputs.pr_number }}
      checkout-submodules: true
      prompt-addendum: |
        **Post line-specific findings as inline review comments** anchored to the
        relevant line(s) — use the inline-comment tool, not a prose list in the
        summary. Reserve the top-level summary comment for a brief overall verdict
        plus any finding not tied to a specific line.
