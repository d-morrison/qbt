# Validates URLs in the docs with lychee, via the reusable workflow in
# d-morrison/gha. PR runs are read-only; main/scheduled runs may file a tracking
# issue. On PRs, add the `links checked by hand` label to skip.
#
# Pinned to the @v2 moving major tag.
name: Check Links

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * 1'   # weekly, Monday 09:00 UTC — catches link rot
  workflow_dispatch:

jobs:
  # PR runs only read the skip-label and the tree — token stays read-only.
  links-pr:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    uses: d-morrison/gha/.github/workflows/check-links.yml@v2
    with:
      lychee-config: lychee.toml

  # main / scheduled / manual runs may file the broken-links tracking issue.
  links-main:
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      issues: write
    uses: d-morrison/gha/.github/workflows/check-links.yml@v2
    with:
      lychee-config: lychee.toml
