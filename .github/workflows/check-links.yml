# Validates URLs in the docs with lychee, via the reusable workflow in
# d-morrison/gha. On main/scheduled runs it may file a broken-links tracking
# issue; on PRs add the `links checked by hand` label to skip.
#
# Single job (per gha's example): the reusable link-checker job declares
# `issues: write`, and a reusable workflow's permissions must be <= the caller's,
# so the caller must grant issues: write even though issue-filing only happens on
# main. (A split read-only-PR / writable-main caller startup-fails for this reason.)
#
# Pinned to the @v2 moving major tag.
name: Check Links

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * 1'   # weekly, Monday 09:00 UTC — catches link rot
  workflow_dispatch:

jobs:
  check:
    permissions:
      contents: read
      issues: write
      pull-requests: read
    uses: d-morrison/gha/.github/workflows/check-links.yml@v2
    with:
      lychee-config: lychee.toml
