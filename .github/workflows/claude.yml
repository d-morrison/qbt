# Calls the reusable Claude Code workflow in d-morrison/gha. Secrets are passed
# explicitly (not via `secrets: inherit`) so the cross-repo call always forwards
# a real token. The reusable workflow enforces the @claude mention + trusted-author
# gate, so no caller-side `if:` is needed.
#
# Pinned to the @v2 moving major tag — the upstream-recommended consumer pin.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
    uses: d-morrison/gha/.github/workflows/claude.yml@v2
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
    with:
      install-quarto: true        # qbt is a Quarto book
      checkout-submodules: true   # qbt vendors content via submodules
